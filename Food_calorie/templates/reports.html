{% extends "base.html" %}

{% block content %}
<div class="nav-links">
    <a href="{{ url_for('index') }}">Dashboard</a>
    <a href="{{ url_for('reports') }}">Reports</a>
    <a href="{{ url_for('logout') }}" style="margin-left: auto;">Logout</a>
</div>

<div class="glass-panel" style="max-width: 1000px;">
    <h1 class="title-glow">Your Analytics</h1>
    
    <div style="display: flex; flex-wrap: wrap; gap: 2rem; margin-top: 2rem;">
        <!-- Weekly Chart -->
        <div style="flex: 1; min-width: 300px; background: #fff; padding: 1rem; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow);">
            <h2 style="font-size: 1.2rem; text-align: center; margin-bottom: 1rem;">Past 7 Days Intake</h2>
            <canvas id="weeklyChart"></canvas>
        </div>
        
        <!-- Meal Distribution Chart -->
        <div style="flex: 1; min-width: 300px; background: #fff; padding: 1rem; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow);">
            <h2 style="font-size: 1.2rem; text-align: center; margin-bottom: 1rem;">Meal Distribution</h2>
            <canvas id="mealChart"></canvas>
        </div>
    </div>
</div>

<!-- Include Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const weeklyLabels = {{ weekly_labels | tojson }};
    const weeklyValues = {{ weekly_values | tojson }};
    const mealLabels = {{ meal_labels | tojson }};
    const mealValues = {{ meal_values | tojson }};
    
    const chartColors = {
        primary: '#4a90e2',
        secondary: '#50e3c2',
        danger: '#e74c3c',
        warning: '#f39c12',
        bg: 'rgba(74, 144, 226, 0.2)'
    };

    // Weekly Line Chart
    new Chart(document.getElementById('weeklyChart'), {
        type: 'line',
        data: {
            labels: weeklyLabels,
            datasets: [{
                label: 'Calories Consumed',
                data: weeklyValues,
                borderColor: chartColors.primary,
                backgroundColor: chartColors.bg,
                borderWidth: 3,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });

    // Meal Distribution Doughnut Chart
    new Chart(document.getElementById('mealChart'), {
        type: 'doughnut',
        data: {
            labels: mealLabels,
            datasets: [{
                data: mealValues,
                backgroundColor: [
                    chartColors.primary,
                    chartColors.secondary,
                    chartColors.danger,
                    chartColors.warning
                ],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            cutout: '60%',
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
</script>
{% endblock %}
