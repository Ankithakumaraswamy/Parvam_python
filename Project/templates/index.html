<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PassVault — Password Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & tokens ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-from:   #c9d6e8;
      --bg-to:     #e8d5f0;
      --glass:     rgba(255,255,255,0.38);
      --glass-b:   rgba(255,255,255,0.18);
      --glass-bd:  rgba(255,255,255,0.55);
      --blur:      18px;
      --shadow:    0 8px 40px rgba(100,80,160,0.13);
      --shadow-lg: 0 20px 60px rgba(100,80,160,0.18);
      --accent:    #7c5cbf;
      --accent2:   #4f9ef8;
      --text:      #2d2540;
      --muted:     #8a84a0;
      --weak:      #e05b5b;
      --medium:    #e09a2b;
      --strong:    #38b27a;
      --radius:    20px;
      --radius-sm: 12px;
      --font:      'DM Sans', sans-serif;
      --font-display: 'Playfair Display', serif;
    }

    body {
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
      background-attachment: fixed;
      padding: 2.5rem 1rem 5rem;
    }

    /* Floating orbs behind everything */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .45;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #b89ee8, transparent 70%);
      top: -120px; left: -100px;
    }
    body::after {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #94c5f8, transparent 70%);
      bottom: -80px; right: -80px;
    }

    /* ── Layout wrapper ─────────────────────────────────── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Glass card ─────────────────────────────────────── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--glass-bd);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.75rem;
      padding: 1.5rem 2rem;
    }
    .logo {
      width: 52px; height: 52px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: grid; place-items: center;
      font-size: 1.5rem;
      box-shadow: 0 6px 24px rgba(124,92,191,.35);
    }
    .header-text h1 {
      font-family: var(--font-display);
      font-size: 1.75rem;
      letter-spacing: -.5px;
      line-height: 1;
      background: linear-gradient(120deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-text p {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: .5px;
    }

    /* Stats strip */
    .stats {
      display: flex;
      gap: .75rem;
      margin-left: auto;
    }
    .stat-pill {
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 99px;
      padding: .35rem .9rem;
      font-size: .78rem;
      font-weight: 600;
      color: var(--accent);
      display: flex; align-items: center; gap: .35rem;
    }
    .stat-pill .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--strong);
    }
    .stat-pill.warn .dot { background: var(--weak); }

    /* ── Section label ──────────────────────────────────── */
    .section-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Add / Edit form card ───────────────────────────── */
    .form-card {
      padding: 1.75rem 2rem 2rem;
      margin-bottom: 1.25rem;
      transition: box-shadow .3s;
    }
    .form-card:focus-within {
      box-shadow: var(--shadow-lg);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    .form-group.span2 { grid-column: 1/-1; }

    label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
    }

    input[type="text"], input[type="password"] {
      background: rgba(255,255,255,.6);
      border: 1.5px solid rgba(255,255,255,.75);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: .9rem;
      padding: .7rem 1rem;
      transition: border-color .2s, background .2s, box-shadow .2s;
      outline: none;
      width: 100%;
    }
    input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,.85);
      box-shadow: 0 0 0 4px rgba(124,92,191,.1);
    }
    input::placeholder { color: #b0aabf; }

    /* Password input wrapper */
    .pwd-wrap { position: relative; display: flex; align-items: center; }
    .pwd-wrap input { padding-right: 3rem; }
    .eye-btn {
      position: absolute; right: .7rem;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1rem;
      padding: .2rem; line-height: 1;
      transition: color .2s, transform .15s;
    }
    .eye-btn:hover { color: var(--accent); transform: scale(1.15); }

    /* Strength bar */
    .str-row { display: flex; align-items: center; gap: .75rem; margin-top: .55rem; }
    .str-track { flex: 1; height: 4px; background: rgba(0,0,0,.1); border-radius: 99px; overflow: hidden; }
    #strength-bar {
      height: 100%; width: 0; border-radius: 99px;
      transition: width .4s cubic-bezier(.4,0,.2,1), background .4s;
    }
    .bar-Weak   { width: 33% !important; background: var(--weak);   }
    .bar-Medium { width: 66% !important; background: var(--medium); }
    .bar-Strong { width: 100%!important; background: var(--strong); }
    #strength-label { font-size: .7rem; font-weight: 700; min-width: 42px; text-align: right; }

    /* Buttons */
    .btn-row { display: flex; gap: .75rem; margin-top: 1.25rem; flex-wrap: wrap; }

    .btn {
      font-family: var(--font);
      font-weight: 600;
      font-size: .85rem;
      border-radius: var(--radius-sm);
      padding: .65rem 1.25rem;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all .2s;
      display: flex; align-items: center; gap: .4rem;
    }
    .btn-ghost {
      background: rgba(255,255,255,.5);
      border-color: rgba(255,255,255,.8);
      color: var(--accent);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,.75);
      box-shadow: 0 4px 16px rgba(124,92,191,.15);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      flex: 1; justify-content: center;
      box-shadow: 0 4px 18px rgba(124,92,191,.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,92,191,.4);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .6; transform: none; cursor: not-allowed; }

    .btn-cancel {
      background: rgba(255,255,255,.4);
      border-color: rgba(0,0,0,.1);
      color: var(--muted);
    }
    .btn-cancel:hover { background: rgba(255,255,255,.65); color: var(--text); }

    /* Edit mode highlight */
    .form-card.editing {
      border-color: rgba(124,92,191,.4);
      background: rgba(245,240,255,.55);
    }
    .edit-banner {
      display: none;
      align-items: center;
      gap: .5rem;
      background: rgba(124,92,191,.1);
      border: 1px solid rgba(124,92,191,.25);
      border-radius: 8px;
      padding: .5rem .85rem;
      font-size: .8rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .edit-banner.visible { display: flex; }

    /* ── Search bar ─────────────────────────────────────── */
    .search-card {
      padding: 1rem 1.5rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .search-icon { font-size: 1.1rem; color: var(--muted); flex-shrink: 0; }
    .search-input {
      background: none;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: .92rem;
      color: var(--text);
      flex: 1;
    }
    .search-input::placeholder { color: var(--muted); }
    .filter-btns { display: flex; gap: .4rem; }
    .filter-chip {
      background: rgba(255,255,255,.5);
      border: 1.5px solid rgba(255,255,255,.75);
      border-radius: 99px;
      padding: .25rem .75rem;
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all .18s;
    }
    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .filter-chip:hover:not(.active) { background: rgba(255,255,255,.75); color: var(--accent); }

    /* ── Vault card ─────────────────────────────────────── */
    .vault-card { padding: 1.75rem 2rem; }
    .vault-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    #result-count { font-size: .78rem; color: var(--muted); }
    #result-count span { color: var(--accent); font-weight: 600; }

    /* Credential rows */
    .cred-list { display: flex; flex-direction: column; gap: .65rem; }

    .cred-row {
      background: rgba(255,255,255,.55);
      border: 1.5px solid rgba(255,255,255,.75);
      border-radius: var(--radius-sm);
      display: grid;
      grid-template-columns: auto 1fr 1fr 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: .9rem 1.1rem;
      transition: background .2s, transform .15s, box-shadow .2s;
      animation: rowIn .3s ease both;
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .cred-row:hover {
      background: rgba(255,255,255,.78);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(100,80,160,.1);
    }

    /* Site avatar */
    .site-av {
      width: 38px; height: 38px; flex-shrink: 0;
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: .9rem; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
    .site-name { font-weight: 600; font-size: .9rem; }
    .site-user { font-size: .78rem; color: var(--muted); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .pwd-display {
      font-size: .82rem;
      font-family: monospace;
      display: flex; align-items: center; gap: .4rem;
    }
    .pwd-text { color: var(--muted); letter-spacing: 2px; }
    .pwd-text.visible { color: var(--text); letter-spacing: .3px; }

    .reveal-sm {
      background: none; border: none; cursor: pointer;
      font-size: .85rem; color: var(--muted);
      padding: .1rem; line-height: 1;
      transition: color .15s, transform .15s;
    }
    .reveal-sm:hover { color: var(--accent); transform: scale(1.15); }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: .25rem;
      font-size: .65rem; font-weight: 700;
      padding: .25rem .55rem; border-radius: 99px;
      letter-spacing: .5px;
    }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .badge-Weak   { background: rgba(224,91,91,.12);  color: var(--weak);   }
    .badge-Weak::before   { background: var(--weak); }
    .badge-Medium { background: rgba(224,154,43,.12); color: var(--medium); }
    .badge-Medium::before { background: var(--medium); }
    .badge-Strong { background: rgba(56,178,122,.13); color: var(--strong); }
    .badge-Strong::before { background: var(--strong); }

    /* Row action buttons */
    .row-actions { display: flex; gap: .4rem; }
    .icon-btn {
      background: rgba(255,255,255,.6);
      border: 1.5px solid rgba(255,255,255,.8);
      border-radius: 8px;
      width: 32px; height: 32px;
      display: grid; place-items: center;
      cursor: pointer; font-size: .85rem;
      transition: all .18s;
      color: var(--muted);
    }
    .icon-btn:hover { background: rgba(255,255,255,.9); color: var(--accent); box-shadow: 0 2px 10px rgba(124,92,191,.15); }
    .icon-btn.del:hover { color: var(--weak); }

    /* ── Empty state ────────────────────────────────────── */
    .empty {
      text-align: center; padding: 3.5rem 1rem;
    }
    .empty-icon { font-size: 3rem; margin-bottom: .75rem; opacity: .5; }
    .empty p { color: var(--muted); font-size: .88rem; line-height: 1.6; }
    .empty strong { color: var(--accent); }

    /* ── Toast ──────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 14px;
      padding: .8rem 1.3rem;
      font-size: .83rem; font-weight: 600;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(100,80,160,.18);
      opacity: 0; transform: translateY(14px);
      transition: all .3s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok   { border-color: rgba(56,178,122,.4); color: var(--strong); }
    #toast.err  { border-color: rgba(224,91,91,.4);  color: var(--weak);   }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .cred-row  { grid-template-columns: auto 1fr auto; }
      .cred-row .pwd-display,
      .cred-row .badge { display: none; }
      .stats { display: none; }
      .filter-btns { display: none; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ── Header ────────────────────────────────────────── -->
  <div class="glass header">
    <div class="logo">🔐</div>
    <div class="header-text">
      <h1>PassVault</h1>
      <p>Your secure credential manager</p>
    </div>
    <div class="stats">
      <div class="stat-pill"><span class="dot"></span><span id="stat-total">0</span> saved</div>
      <div class="stat-pill warn" id="stat-weak-pill" style="display:none">
        <span class="dot"></span><span id="stat-weak">0</span> weak
      </div>
    </div>
  </div>

  <!-- ── Add / Edit form ───────────────────────────────── -->
  <div class="glass form-card" id="form-card">

    <div class="edit-banner" id="edit-banner">✏️ Editing entry — <span id="edit-site-name"></span></div>
    <div class="section-label" id="form-label">Add new credential</div>

    <div class="form-grid">
      <div class="form-group">
        <label for="site">Website / App</label>
        <input id="site" type="text" placeholder="e.g. Gmail" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label for="username">Username / Email</label>
        <input id="username" type="text" placeholder="e.g. divya@gmail.com" autocomplete="off"/>
      </div>
      <div class="form-group span2">
        <label for="password">Password</label>
        <div class="pwd-wrap">
          <input id="password" type="password" placeholder="Enter or generate a password" autocomplete="new-password"/>
          <button class="eye-btn" id="toggle-input-btn" type="button">👁</button>
        </div>
        <div class="str-row">
          <div class="str-track"><div id="strength-bar"></div></div>
          <span id="strength-label"></span>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" id="generate-btn" type="button">⚡ Generate</button>
      <button class="btn btn-cancel" id="cancel-btn" type="button" style="display:none">✕ Cancel</button>
      <button class="btn btn-primary" id="save-btn" type="button">
        <span id="save-label">💾 Save to Vault</span>
      </button>
    </div>
  </div>

  <!-- ── Search & filter ───────────────────────────────── -->
  <div class="glass search-card">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="Search by site or username…"/>
    <div class="filter-btns">
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="Strong">Strong</button>
      <button class="filter-chip" data-filter="Medium">Medium</button>
      <button class="filter-chip" data-filter="Weak">Weak</button>
    </div>
  </div>

  <!-- ── Vault list ─────────────────────────────────────── -->
  <div class="glass vault-card">
    <div class="vault-top">
      <div class="section-label" style="margin-bottom:0">Vault</div>
      <div id="result-count">Showing <span>0</span> entries</div>
    </div>
    <div class="cred-list" id="cred-list">
      <!-- rendered by JS -->
    </div>
  </div>

</div><!-- /wrap -->

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let allEntries   = [];
let editingId    = null;
let filterStr    = 'all';
let searchQuery  = '';
let toastTimer;

// ── DOM refs ──────────────────────────────────────────────────────────────
const siteEl     = document.getElementById('site');
const usernameEl = document.getElementById('username');
const passwordEl = document.getElementById('password');
const genBtn     = document.getElementById('generate-btn');
const saveBtn    = document.getElementById('save-btn');
const saveLabel  = document.getElementById('save-label');
const cancelBtn  = document.getElementById('cancel-btn');
const toggleBtn  = document.getElementById('toggle-input-btn');
const strBar     = document.getElementById('strength-bar');
const strLabel   = document.getElementById('strength-label');
const credList   = document.getElementById('cred-list');
const searchEl   = document.getElementById('search-input');
const formCard   = document.getElementById('form-card');
const editBanner = document.getElementById('edit-banner');
const editSiteName = document.getElementById('edit-site-name');
const formLabel  = document.getElementById('form-label');
const resultCount= document.getElementById('result-count').querySelector('span');
const statTotal  = document.getElementById('stat-total');
const statWeak   = document.getElementById('stat-weak');
const statWeakPill=document.getElementById('stat-weak-pill');

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type='ok') {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Strength UI ───────────────────────────────────────────────────────────
const strColors = { Weak: '#e05b5b', Medium: '#e09a2b', Strong: '#38b27a' };
function updateStrUI(s) {
  strBar.className = s ? 'bar-' + s : '';
  if (!s) { strBar.style.width = '0'; strLabel.textContent = ''; return; }
  strLabel.textContent = s;
  strLabel.style.color = strColors[s] || '#8a84a0';
}

passwordEl.addEventListener('input', async () => {
  if (!passwordEl.value) { updateStrUI(''); return; }
  const r = await fetch('/api/check-strength', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password: passwordEl.value })
  });
  const d = await r.json();
  updateStrUI(d.strength);
});

// ── Show/hide (form input) ────────────────────────────────────────────────
toggleBtn.addEventListener('click', () => {
  const show = passwordEl.type === 'password';
  passwordEl.type = show ? 'text' : 'password';
  toggleBtn.textContent = show ? '🙈' : '👁';
});

// ── Generate password ─────────────────────────────────────────────────────
genBtn.addEventListener('click', async () => {
  genBtn.disabled = true;
  const r = await fetch('/api/generate-password');
  const d = await r.json();
  passwordEl.value = d.password;
  passwordEl.type  = 'text';
  toggleBtn.textContent = '🙈';
  updateStrUI(d.strength);
  genBtn.disabled = false;
});

// ── Edit mode helpers ─────────────────────────────────────────────────────
function enterEditMode(entry) {
  editingId = entry.id;
  siteEl.value     = entry.site;
  usernameEl.value = entry.username;
  passwordEl.value = entry.password;
  passwordEl.type  = 'text';
  toggleBtn.textContent = '🙈';
  updateStrUI(entry.strength);
  formCard.classList.add('editing');
  editBanner.classList.add('visible');
  editSiteName.textContent = entry.site;
  formLabel.textContent = 'Edit credential';
  saveLabel.textContent = '✏️ Update Entry';
  cancelBtn.style.display = '';
  siteEl.focus();
  formCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function exitEditMode() {
  editingId = null;
  siteEl.value = usernameEl.value = passwordEl.value = '';
  passwordEl.type = 'password';
  toggleBtn.textContent = '👁';
  updateStrUI('');
  formCard.classList.remove('editing');
  editBanner.classList.remove('visible');
  formLabel.textContent = 'Add new credential';
  saveLabel.textContent = '💾 Save to Vault';
  cancelBtn.style.display = 'none';
}

cancelBtn.addEventListener('click', exitEditMode);

// ── Save / Update ─────────────────────────────────────────────────────────
saveBtn.addEventListener('click', async () => {
  const site     = siteEl.value.trim();
  const username = usernameEl.value.trim();
  const password = passwordEl.value.trim();
  if (!site || !username || !password) {
    toast('⚠️ All fields are required', 'err'); return;
  }
  saveBtn.disabled = true;

  const url    = editingId ? `/api/credentials/${editingId}` : '/api/credentials';
  const method = editingId ? 'PUT' : 'POST';
  const res    = await fetch(url, {
    method, headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ site, username, password })
  });

  if (res.ok) {
    toast(editingId ? '✅ Entry updated!' : '✅ Saved to vault!', 'ok');
    exitEditMode();
    await loadVault();
  } else {
    const e = await res.json();
    toast('❌ ' + (e.error || 'Error'), 'err');
  }
  saveBtn.disabled = false;
});

// ── Delete ────────────────────────────────────────────────────────────────
async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  const res = await fetch('/api/credentials/' + id, { method: 'DELETE' });
  if (res.ok) { toast('🗑 Deleted', 'ok'); await loadVault(); }
}

// ── Search & filter logic ─────────────────────────────────────────────────
searchEl.addEventListener('input', () => {
  searchQuery = searchEl.value.toLowerCase();
  renderVault();
});

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    filterStr = chip.dataset.filter;
    renderVault();
  });
});

function getFiltered() {
  return allEntries.filter(e => {
    const matchStr = filterStr === 'all' || e.strength === filterStr;
    const matchQ   = !searchQuery ||
      e.site.toLowerCase().includes(searchQuery) ||
      e.username.toLowerCase().includes(searchQuery);
    return matchStr && matchQ;
  });
}

// ── Render vault ──────────────────────────────────────────────────────────
function renderVault() {
  const visible = getFiltered();
  resultCount.textContent = visible.length;

  if (visible.length === 0) {
    credList.innerHTML = `
      <div class="empty">
        <div class="empty-icon">${allEntries.length === 0 ? '🔒' : '🔎'}</div>
        <p>${allEntries.length === 0
          ? 'Your vault is empty.<br>Add your first credential above.'
          : 'No entries match <strong>' + (searchQuery || filterStr) + '</strong>.'
        }</p>
      </div>`;
    return;
  }

  credList.innerHTML = '';
  visible.forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'cred-row';
    row.style.animationDelay = (i * 40) + 'ms';
    row.id = 'row-' + entry.id;
    row.innerHTML = `
      <div class="site-av">${entry.site[0].toUpperCase()}</div>
      <div>
        <div class="site-name">${esc(entry.site)}</div>
        <div class="site-user">${esc(entry.username)}</div>
      </div>
      <div class="pwd-display">
        <button class="reveal-sm" data-id="${entry.id}" title="Show/hide">👁</button>
        <span class="pwd-text" id="pt-${entry.id}">••••••••••••</span>
      </div>
      <span class="badge badge-${entry.strength}">${entry.strength}</span>
      <div class="row-actions">
        <button class="icon-btn edit-btn" data-id="${entry.id}" title="Edit">✏️</button>
        <button class="icon-btn del" data-id="${entry.id}" title="Delete">🗑</button>
      </div>`;
    credList.appendChild(row);

    // Reveal toggle
    row.querySelector('.reveal-sm').addEventListener('click', function() {
      const span = document.getElementById('pt-' + entry.id);
      if (span.classList.contains('visible')) {
        span.textContent = '••••••••••••';
        span.classList.remove('visible');
        this.textContent = '👁';
      } else {
        span.textContent = entry.password;
        span.classList.add('visible');
        this.textContent = '🙈';
      }
    });

    // Edit
    row.querySelector('.edit-btn').addEventListener('click', () => enterEditMode(entry));

    // Delete
    row.querySelector('.del').addEventListener('click', () => deleteEntry(entry.id));
  });
}

// ── Load from server ──────────────────────────────────────────────────────
async function loadVault() {
  const res = await fetch('/api/credentials');
  allEntries = await res.json();

  // Update stats
  statTotal.textContent = allEntries.length;
  const weakCount = allEntries.filter(e => e.strength === 'Weak').length;
  statWeak.textContent = weakCount;
  statWeakPill.style.display = weakCount > 0 ? '' : 'none';

  renderVault();
}

// ── XSS-safe text escape ──────────────────────────────────────────────────
function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────
loadVault();
</script>
